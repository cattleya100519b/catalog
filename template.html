<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<!-- 外部CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="layout">

<!-- ===============================
目次
=============================== -->

<nav class="toc">

{% for c in cases %}
<a href="#{{c.name}}">{{c.name}}</a>
{% endfor %}

</nav>


<main>

<h1>Model Comparison</h1>

<!-- ===============================
モデル表示ON/OFF
=============================== 

<div class="controls">

<label><input type="checkbox" checked data-col="0"> M1</label>
<label><input type="checkbox" checked data-col="1"> M2</label>
<label><input type="checkbox" checked data-col="2"> M3</label>
<label><input type="checkbox" checked data-col="3"> M4</label>
<label><input type="checkbox" checked data-col="4"> M5</label>

</div>
-->

{% for c in cases %}

<section id="{{c.name}}" class="case">

<h2>{{c.name}}</h2>

<!-- input + GT -->

<div class="row2">

<div class="imgbox">
<div class="label">input</div>
<img src="{{c.input}}" loading="lazy">
</div>

<div class="imgbox">
<div class="label">gt</div>
<img src="{{c.gt}}" loading="lazy">
</div>

</div>

<!-- モデル出力 -->

<div class="row5">

{% for m in c.models %}

<div class="imgbox">
<div class="label">model{{loop.index}}</div>
<img src="{{m}}" loading="lazy">
</div>

{% endfor %}

</div>


<!-- 正規化 -->

<div class="row5">

{% for m in c.norms %}

<div class="imgbox">
<div class="label">norm_model{{loop.index}}</div>
<img src="{{m}}" loading="lazy">
</div>

{% endfor %}

</div>


</section>

{% endfor %}

</main>

</div>


<!-- ===============================
モーダル
=============================== -->

<div id="modal">

<img id="modalImg">

<div id="modalInfo"></div>

</div>


<script src="script.js"></script>

</body>
</html>
